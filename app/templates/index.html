<!doctype html>
<html>
<head>

  "OnlineBackup": "Yes",
  "DeviceProtection": "No",
  "TechSupport": "No",
  "StreamingTV": "No",
  "StreamingMovies": "No",

  "PaperlessBilling": "Yes",
  "PaymentMethod": "Electronic check",

  "TotalCharges": 29.85
}

  <button id="btnPredict">Predict</button>

  <h3>Result</h3>
  <pre id="result">(none)</pre>

</html>
