<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Churn Predictor</title>
  <script src="{{ url_for('static', filename='app.js') }}" defer></script>
  <style>
    /* Reset and Base Styles */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f0f2f5;
      background-image: linear-gradient(135deg, #f0f2f5 0%, #e1e5ea 100%);
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    /* Main Container Card */
    .container {
      background: white;
      width: 100%;
      max-width: 800px;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    }

    /* Headers */
    h2 {
      color: #1a202c;
      font-weight: 700;
      margin-bottom: 10px;
      text-align: center;
    }

    p.subtitle {
      text-align: center;
      color: #718096;
      margin-bottom: 30px;
      font-size: 0.95rem;
    }

    /* Input Area (Code Editor Look) */
    .editor-label {
      font-weight: 600;
      margin-bottom: 8px;
      display: block;
      color: #4a5568;
    }

    textarea {
      width: 100%;
      height: 320px;
      font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
      font-size: 14px;
      background-color: #1e1e1e; /* Dark editor background */
      color: #d4d4d4; /* Light code text */
      border: 1px solid #4a5568;
      border-radius: 8px;
      padding: 15px;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
    }

    textarea:focus {
      border-color: #3182ce;
    }

    /* Button Styling */
    button {
      display: block;
      width: 100%;
      margin-top: 20px;
      padding: 14px;
      background-color: #3182ce; /* Primary Blue */
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s, transform 0.1s;
    }

    button:hover {
      background-color: #2b6cb0;
    }

    button:active {
      transform: translateY(1px);
    }

    /* Result Area */
    .result-section {
      margin-top: 30px;
      border-top: 1px solid #e2e8f0;
      padding-top: 20px;
    }

    h3 {
      font-size: 1.1rem;
      color: #2d3748;
      margin-bottom: 10px;
    }

    pre {
      background: #f7fafc;
      border: 1px solid #e2e8f0;
      border-left: 4px solid #3182ce;
      border-radius: 6px;
      padding: 15px;
      color: #2d3748;
      font-family: 'Consolas', monospace;
      white-space: pre-wrap; /* Wraps text if result is long */
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>Customer Churn Prediction</h2>
    <p class="subtitle">Enter customer data in JSON format below to analyze churn risk.</p>

    <label class="editor-label" for="payload">Input Payload (JSON)</label>
    <textarea id="payload" spellcheck="false">
{
  "gender": "Male",
  "SeniorCitizen": 0,
  "Partner": "Yes",
  "Dependents": "No",
  "tenure": 1,
  "PhoneService": "No",
  "MultipleLines": "No phone service",
  "InternetService": "DSL",
  "OnlineSecurity": "No",
  "OnlineBackup": "Yes",
  "DeviceProtection": "No",
  "TechSupport": "No",
  "StreamingTV": "No",
  "StreamingMovies": "No",
  "Contract": "Month-to-month",
  "PaperlessBilling": "Yes",
  "PaymentMethod": "Electronic check",
  "MonthlyCharges": 29.85,
  "TotalCharges": 29.85
}</textarea>

    <button id="btnPredict">Run Prediction</button>

    <div class="result-section">
      <h3>Prediction Result</h3>
      <pre id="result">Waiting for input...</pre>
    </div>
  </div>

</body>
</html>
